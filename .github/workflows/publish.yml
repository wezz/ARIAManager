name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Setup git
        run: |
          git config user.email "1185533+wezz@users.noreply.github.com"
          git config user.name "Wezz Balk"

      - name: Bump version, build and push
        run: |
          git checkout -- .
          npm version patch
          npm run build
          git add .
          git commit -m "chore: release" || true
          git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public
